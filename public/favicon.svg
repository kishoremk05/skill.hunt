<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Cyan to Violet Gradient representing transition to excellence -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <!-- Soft glow filter for the main trophy elements -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Concentric Target Rings representing the "Hunt" -->
  <circle cx="50" cy="48" r="40" fill="none" stroke="url(#g1)" stroke-width="2" stroke-dasharray="6 6" opacity="0.4" />
  <circle cx="50" cy="48" r="28" fill="none" stroke="url(#g1)" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.6" />
  
  <!-- Target Crosshairs (Scope ticks) -->
  <line x1="50" y1="4" x2="50" y2="12" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" />
  <line x1="50" y1="84" x2="50" y2="92" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" />
  <line x1="8" y1="48" x2="16" y2="48" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" />
  <line x1="84" y1="48" x2="92" y2="48" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" />

  <!-- Stylized Glowing Trophy Cup representing "Skill" & Excellence -->
  <!-- Trophy Handles -->
  <path d="M34 32 C20 32, 20 54, 34 54" fill="none" stroke="url(#g1)" stroke-width="4" stroke-linecap="round" />
  <path d="M66 32 C80 32, 80 54, 66 54" fill="none" stroke="url(#g1)" stroke-width="4" stroke-linecap="round" />

  <!-- Trophy Body -->
  <path d="M34 26 H66 L60 56 C60 66, 40 66, 40 56 Z" fill="url(#g1)" filter="url(#glow)" />
  
  <!-- Trophy Stem -->
  <path d="M47 62 H53 V74 H47 Z" fill="url(#g1)" />
  
  <!-- Trophy Base -->
  <path d="M36 76 H64 C66 76, 66 82, 64 82 H36 C34 82, 34 76, 36 76 Z" fill="url(#g1)" filter="url(#glow)" />
  
  <!-- Star on the Trophy (representing top rankings) -->
  <path d="M50 36 L52 41 L57 41.5 L53 45 L54 50 L50 47.5 L46 50 L47 45 L43 41.5 L48 41 Z" fill="#FFFFFF" />
</svg>
